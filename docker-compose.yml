services:
  ochiel:
    build:
      context: ..
      dockerfile: ochiel/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=/app/backend/data/ochiel.db
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY:-placeholder}
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - ochiel_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ochiel_data:
    driver: local